# Mosquitto config for evalink.
#
# TLS is intentionally NOT configured here: Cloudflare Spectrum terminates
# SSL on the public side and forwards plain MQTT to this broker.
#
# Auth is required. The container entrypoint generates /mosquitto/data/passwd
# from the MQTT_USER / MQTT_PASSWORD environment variables on startup.

listener 1883 0.0.0.0
protocol mqtt

allow_anonymous false
password_file /mosquitto/data/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
